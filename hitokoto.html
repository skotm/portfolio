<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skotm | ひとこと</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-zinc-200 text-zinc-800 dark:bg-zinc-800 dark:text-zinc-100 transition-colors duration-300 antialiased selection:bg-blue-500/30 min-h-screen py-16 md:py-24">

    <div class="max-w-2xl mx-auto px-4">
        <a href="./index.html" class="inline-flex items-center gap-2 text-sm font-bold text-zinc-500 dark:text-zinc-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors mb-8 group">
            <span class="group-hover:-translate-x-1 transition-transform">←</span> ポートフォリオに戻る
        </a>

        <article class="rounded-3xl bg-zinc-300/30 dark:bg-zinc-700/40 backdrop-blur-2xl border border-zinc-400/30 dark:border-zinc-600/50 p-6 md:p-10 shadow-xl">
            <header class="border-b border-zinc-400/30 dark:border-zinc-600/50 pb-4 mb-6">
                <span class="text-xs font-mono text-zinc-500 dark:text-zinc-400 uppercase tracking-widest font-bold">Blog / Stream</span>
                <h1 class="text-2xl md:text-3xl font-black mt-1 text-zinc-800 dark:text-white">ひとことログ</h1>
            </header>

            <div id="full-markdown-container" class="prose prose-zinc dark:prose-invert max-w-none leading-relaxed">
                <div class="animate-pulse flex flex-col gap-4">
                    <div class="h-4 bg-zinc-400/30 rounded w-1/4"></div>
                    <div class="h-3 bg-zinc-400/20 rounded w-full"></div>
                    <div class="h-3 bg-zinc-400/20 rounded w-5/6"></div>
                </div>
            </div>
        </article>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('full-markdown-container');
            try {
                const response = await fetch('./assets/hitokoto.md?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Markdown not found');
                const text = await response.text();
                container.innerHTML = marked.parse(text);
            } catch (e) {
                container.innerHTML = `<p class="text-zinc-500 italic">記事を読み込めませんでした。</p>`;
            }
        });
    </script>
</body>
</html>
